<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Faça seu cadastro</title>
</head>
<body>

<div class="container">
    <header>
        <div class="titles">
            <h1>Faça seu cadastro!</h1>
            <h2>Compre online 🏷️</h2>
        </div>
        <div class="header-icons">
            <span>👤<span style="color: rgb(42, 110, 42); font-size: 20px;">+</span></span>
            <span>👩<span style="color: rgb(41, 97, 41); font-size: 20px;">+</span></span>
        </div>
    </header>

    <form action="#" method="POST">
        <div class="section">
            <div class="section-title">Dados Pessoais</div>
            <div class="section-body">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <!-- Campo obrigatório -->
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <!-- E-mail já tem validação de formato e é obrigatório -->
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="nascimento">Data de Nascimento</label>
                    <!-- Type date já não aceita letras. Obrigatório. -->
                    <input type="date" id="nascimento" name="nascimento" required>
                </div>
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <!-- Obrigatório e exige o formato 000.000.000-00 -->
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Digite o CPF no formato: 000.000.000-00">
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Endereço</div>
            <div class="section-body">
                <div class="form-group">
                    <label for="rua">Rua</label>
                    <input type="text" id="rua" name="rua" required>
                </div>
                <div class="form-group">
                    <label for="numero">Número</label>
                    <!-- Type number não aceita letras. Mínimo 1. -->
                    <input type="number" id="numero" name="numero" min="1" required>
                </div>
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" name="bairro" required>
                </div>
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <!-- Obrigatório e exige o formato 00000-000 -->
                    <input type="text" id="cep" name="cep" placeholder="00000-000" required pattern="\d{5}-\d{3}" title="Digite o CEP no formato: 00000-000">
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade" required>
                </div>
                <div class="form-group">
                    <label for="estado">Estado</label>
                    <!-- Select obrigatório, barra envio se ficar no "Selecione um estado" -->
                    <select id="estado" name="estado" required>
                        <option value="">Selecione um estado</option>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Login</div>
            <div class="section-body">
                <div class="form-group">
                    <label for="perfil">Imagem de perfil</label>
                    <!-- Limita a seleção apenas para arquivos de imagem -->
                    <input type="file" id="perfil" name="perfil" accept="image/*">
                </div>
                <div class="form-group">
                    <label for="login">Login</label>
                    <!-- Obrigatório e exige mínimo de 4 caracteres -->
                    <input type="text" id="login" name="login" required minlength="4" title="O login deve ter pelo menos 4 caracteres.">
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <!-- Obrigatório e exige mínimo de 6 caracteres -->
                    <input type="password" id="senha" name="senha" required minlength="6" title="A senha deve ter pelo menos 6 caracteres.">
                </div>
            </div>
        </div>

        <div class="form-actions">
            <!-- Coloquei um onclick pro botão cancelar dar um reset no form -->
            <button type="reset" class="btn-cancel">Cancelar</button>
            <button type="submit" class="btn-submit">Enviar</button>
        </div>
    </form>
</div>

</body>
</html>
